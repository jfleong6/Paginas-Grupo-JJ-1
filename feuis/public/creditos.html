<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FEUIS - Carrusel de Créditos</title>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link rel="stylesheet" href="css/creditos.css">
</head>

<body>
    <div class="app-container">
        <!-- Header -->
        <header class="header">
            <div class="logo">
                <div class="logo-text">
                    <h1>Créditos FEUIS</h1>
                    <p>13 líneas de crédito disponibles</p>
                </div>
            </div>

            <div class="stats">
                <div class="stat-item">
                    <div class="stat-number">13</div>
                    <div class="stat-label">Créditos</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number">100%</div>
                    <div class="stat-label">Aprobación</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number">24h</div>
                    <div class="stat-label">Respuesta</div>
                </div>
            </div>
        </header>

        <!-- Carrusel Principal -->
        <section class="carousel-main">
            <button class="control-btn" id="prevBtn">
                    <i class="fas fa-chevron-left"></i>
                </button>
            <div class="carousel-track" id="carouselTrack">
                <!-- Slides se generarán dinámicamente -->
            </div>
            <button class="control-btn" id="nextBtn">
                    <i class="fas fa-chevron-right"></i>
                </button>

        </section>

        <!-- Miniaturas -->
        <section class="thumbnails-container">
            <div class="thumbnails-track" id="thumbnailsTrack">
                <!-- Miniaturas se generarán dinámicamente -->
            </div>

            <div class="carousel-controls">
                
                
            </div>
        </section>
    </div>

    <!-- Modal de Detalles -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal" id="modal">
            <!-- Contenido del modal se generará dinámicamente -->
        </div>
    </div>

    <script src="js/creditos.js"></script>
</body>

</html>
